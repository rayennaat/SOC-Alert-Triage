server.port=8081
spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5433/secuiq
spring.datasource.username=postgres
spring.datasource.password=postgres

# THIS IS THE MISSING LINE THAT FIXES EVERYTHING
spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Show us the truth
logging.level.org.springframework.jdbc=DEBUG
management.endpoints.web.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS
